<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/splat/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + TypeScript</title>
    <script type="module" crossorigin src="/splat/assets/index-BFRjFJS7.js"></script>
    <link rel="stylesheet" crossorigin href="/splat/assets/index-C-SK_vR9.css">
  </head>
  <body>
    <div id="app">
      <div id="progress"></div>
      <div id="message"></div>
      <div id="spinner" class="hidden">
        <div class="spinner-ring"></div>
      </div>
      <div id="dropzone">Drop or click to upload a `.splat` or `.ply` file</div>
      <canvas id="canvas"></canvas>
      <div id="stereo-controls" aria-label="Stereo controls">
        <button
          id="btn-anaglyph"
          class="stereo-btn"
          type="button"
          aria-pressed="false"
          aria-label="Toggle anaglyph mode"
          title="Anaglyph Mode"
        >
          <img class="stereo-icon" src="/splat/assets/icon_anaglyph.png" alt="" aria-hidden="true" />
        </button>
        <button
          id="btn-stereo"
          class="stereo-btn"
          type="button"
          aria-pressed="false"
          aria-label="Toggle side-by-side VR mode"
          title="Side-by-Side VR Mode"
        >
          <img class="stereo-icon" src="/splat/assets/icon_vr.png" alt="" aria-hidden="true" />
        </button>
      </div>
      <div id="quality"><span id="fps"></span></div>
    </div>
  </body>
</html>
